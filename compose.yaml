# mymusicdl — self-hosted family music downloader for Navidrome.
# Place this next to a .env (see .env.example) and run `docker compose up -d`.
# Built for a Cloudflare-tunnel + Watchtower homelab, but every site-specific value
# (hostname, networks, bind IP, music volume, data dir) is driven from .env.
services:
  mymusicdl:
    # Pull the CI-built image from GHCR (.github/workflows/docker-image.yml).
    # Watchtower (label below) auto-updates the container when a new :latest is pushed.
    # To build locally instead, comment out `image:` and uncomment `build: .`.
    image: ghcr.io/borborborja/mymusicdl:latest
    # build: .
    container_name: mymusicdl
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${PORT:-8080}
      APP_DATA_DIR: /data
      MUSIC_LIBRARY_PATH: /music
      TOOLS_VENV: /data/toolsvenv
      NAVIDROME_URL: ${NAVIDROME_URL}
      NAVIDROME_USER: ${NAVIDROME_USER}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      DOWNLOAD_CONCURRENCY: ${DOWNLOAD_CONCURRENCY:-2}
      APP_SECRET: ${APP_SECRET}
      APP_SHARED_PASSWORD: ${APP_SHARED_PASSWORD:-}
    volumes:
      # SQLite DB + the mounted tools venv (so `pip install -U` upgrades persist).
      - ${DATA_DIR:-./data}:/data
      # Share the SAME named volume your Navidrome stack uses for its music library,
      # so a freshly downloaded file is immediately visible to Navidrome. Set
      # MUSIC_VOLUME to that volume's name (it must already exist).
      - music:/music
    networks:
      - edge
      - internal
    ports:
      # Bind the web UI on the host. Default is loopback-only; set LAN_BIND_IP to a LAN
      # address (or 0.0.0.0) to expose it. Behind a tunnel you can drop this block.
      - "${LAN_BIND_IP:-127.0.0.1}:${PORT:-8080}:8080"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      docker-volume-backup.stop-during-backup: "true"
      dockflare.enable: "true"
      dockflare.hostname: "${PUBLIC_HOSTNAME:-music.example.com}"
      dockflare.service: "http://mymusicdl:8080"
      dockflare.access.group: "${DOCKFLARE_ACCESS_GROUP:-family}"

networks:
  # External networks created outside this stack: `edge` is your Cloudflare-tunnel
  # network, `internal` is the shared network your Navidrome/other services sit on.
  # Their real names come from .env (EDGE_NETWORK / INTERNAL_NETWORK).
  edge:
    name: ${EDGE_NETWORK:-cloudflare-net}
    external: true
  internal:
    name: ${INTERNAL_NETWORK:-internal}
    external: true

volumes:
  # External named volume holding the music library (the same one Navidrome mounts).
  music:
    name: ${MUSIC_VOLUME:-music}
    external: true
