name: Checks

# Quality gate for PRs and main: backend lint/format/import wiring + frontend typecheck/build.
# Mirrors the verification matrix in CLAUDE.md / docs/VERIFICATION.md.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev tools
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check backend

      - name: black
        run: black --check backend

      - name: Import wiring (create_app)
        run: python -c "from backend.app.main import create_app; create_app()"

      - name: pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build
